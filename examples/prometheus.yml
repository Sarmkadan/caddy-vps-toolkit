# Prometheus Configuration Example for caddy-vps-toolkit
# This configuration enables metrics collection from caddy-vps-toolkit

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'caddy-vps-toolkit'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # caddy-vps-toolkit metrics
  - job_name: 'caddy-vps-toolkit'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Caddy metrics (if exposed)
  - job_name: 'caddy'
    static_configs:
      - targets: ['localhost:2019']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Node exporter (optional, for system metrics)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['localhost:9100']

  # PostgreSQL exporter (optional, for database metrics)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['localhost:9187']

  # Redis exporter (optional, for cache metrics)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['localhost:9121']

