version: '3.8'

services:
  # Caddy reverse proxy
  caddy:
    image: caddy:latest
    container_name: caddy-dev
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./examples/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: localhost
      ACME_AGREE: "true"
    networks:
      - dev-network
    restart: unless-stopped

  # Caddy VPS Toolkit
  caddy-vps-toolkit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: caddy-vps-toolkit-dev
    volumes:
      - .:/app
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - dev-network
    depends_on:
      - postgres
      - redis
    command: tail -f /dev/null
    restart: unless-stopped

  # Test API service
  test-api:
    image: mcr.microsoft.com/dotnet/samples:aspnetapp-nanoserver-ltsc2022
    container_name: test-api-dev
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Test database
  postgres:
    image: postgres:15-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Test cache
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./examples/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - dev-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dev
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - dev-network
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  dev-network:
    driver: bridge

# Development environment setup
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose down               # Stop all services
#   docker-compose logs -f            # View logs
#   docker-compose ps                 # List services
#
# Access URLs:
#   API:        http://localhost:8080
#   Caddy:      http://localhost:80
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3001 (admin/admin123)
#   Postgres:   localhost:5432 (testuser/testpass)
#   Redis:      localhost:6379
#
# Test toolkit against services:
#   caddy-vps-toolkit service add \
#     --name test-api \
#     --port 8080 \
#     --domain api.localhost \
#     --health-check-url http://localhost:8080/health
#
#   caddy-vps-toolkit health check test-api
